<!-- =========================================================
     Daehanfeed Market Intelligence
     Supabase Shared State Sync
     위치: </body> 바로 위에 붙여넣기
========================================================= -->
<script id="dhfeed-supabase-shared-state">
(function () {
  'use strict';

  /* =========================
     0. Supabase 연결 설정
  ========================= */
  const SUPABASE_URL = 'https://ejghcmxerswoyiyxpuro.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_KcEH2eD-PcrQg642o1j4Bw_sKJLIOSv';

  const TABLE_NAME = 'dashboard_snapshots';
  const WORKSPACE_ID = 'main';
  const SDK_URL = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';

  let DH_DB = null;
  let DH_APPLYING = false;
  let DH_SAVING = false;
  let DH_LAST_LOADED_ID = null;
  let DH_LAST_SAVE_AT = 0;

  /* =========================
     1. 공통 유틸
  ========================= */
  function dhLog() {
    try {
      console.log.apply(console, ['[DH 공유저장]'].concat(Array.prototype.slice.call(arguments)));
    } catch (e) {}
  }

  function dhWarn() {
    try {
      console.warn.apply(console, ['[DH 공유저장]'].concat(Array.prototype.slice.call(arguments)));
    } catch (e) {}
  }

  function dhClone(obj) {
    try {
      if (obj === undefined) return null;
      return JSON.parse(JSON.stringify(obj));
    } catch (e) {
      return null;
    }
  }

  function dhReadGlobal(name) {
    try {
      if (window[name] !== undefined) return window[name];
    } catch (e) {}

    try {
      return (0, eval)(name);
    } catch (e) {
      return null;
    }
  }

  function dhWriteGlobal(name, value) {
    try {
      window[name] = value;
    } catch (e) {}

    try {
      window.__DH_SHARED_TEMP_VALUE__ = value;
      (0, eval)(name + ' = window.__DH_SHARED_TEMP_VALUE__');
      delete window.__DH_SHARED_TEMP_VALUE__;
      return true;
    } catch (e) {
      try { delete window.__DH_SHARED_TEMP_VALUE__; } catch (_) {}
      return false;
    }
  }

  function dhLoadScript(src) {
    return new Promise(function (resolve, reject) {
      if (window.supabase) {
        resolve();
        return;
      }

      const old = document.querySelector('script[src="' + src + '"]');
      if (old) {
        old.addEventListener('load', resolve);
        old.addEventListener('error', reject);
        return;
      }

      const s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  function dhReady(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else {
      fn();
    }
  }

  /* =========================
     2. 화면 표시용 작은 상태 배지
  ========================= */
  function dhEnsureBadge() {
    let badge = document.getElementById('dhSharedBadge');
    if (badge) return badge;

    badge = document.createElement('div');
    badge.id = 'dhSharedBadge';
    badge.style.cssText = [
      'position:fixed',
      'left:18px',
      'bottom:18px',
      'z-index:99999',
      'background:rgba(14,27,46,.94)',
      'color:#fff',
      'font-family:system-ui,-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif',
      'font-size:12px',
      'line-height:1.35',
      'padding:10px 12px',
      'border-radius:10px',
      'box-shadow:0 8px 24px rgba(0,0,0,.18)',
      'display:flex',
      'align-items:center',
      'gap:8px',
      'max-width:340px'
    ].join(';');

    badge.innerHTML =
      '<span id="dhSharedDot" style="width:8px;height:8px;border-radius:50%;background:#C9A961;display:inline-block;flex:0 0 auto"></span>' +
      '<span id="dhSharedText">공유 저장 준비 중...</span>' +
      '<button id="dhSharedSaveBtn" type="button" style="margin-left:6px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;border-radius:6px;padding:4px 7px;font-size:11px;cursor:pointer">저장</button>' +
      '<button id="dhSharedLoadBtn" type="button" style="border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;border-radius:6px;padding:4px 7px;font-size:11px;cursor:pointer">불러오기</button>';

    document.body.appendChild(badge);

    const saveBtn = document.getElementById('dhSharedSaveBtn');
    const loadBtn = document.getElementById('dhSharedLoadBtn');

    if (saveBtn) {
      saveBtn.addEventListener('click', function () {
        window.saveSharedDashboardState('manual-button');
      });
    }

    if (loadBtn) {
      loadBtn.addEventListener('click', function () {
        window.loadLatestSharedDashboardState(true);
      });
    }

    return badge;
  }

  function dhSetBadge(text, type) {
    try {
      dhEnsureBadge();
      const t = document.getElementById('dhSharedText');
      const d = document.getElementById('dhSharedDot');

      if (t) t.textContent = text;

      if (d) {
        if (type === 'ok') d.style.background = '#6BCC8B';
        else if (type === 'err') d.style.background = '#FF8B94';
        else if (type === 'wait') d.style.background = '#C9A961';
        else d.style.background = '#8C95AB';
      }
    } catch (e) {}
  }

  /* =========================
     3. 현재 대시보드 상태 수집
  ========================= */
  function dhMakeSnapshot(reason) {
    const snapshot = {
      app: 'dhfeed-market-intelligence',
      version: 'shared-state-v1',
      reason: reason || 'manual',
      savedAt: new Date().toISOString(),

      /* 배합사료 생산량 전망 쪽 */
      USER_UPLOADS: dhClone(dhReadGlobal('USER_UPLOADS')),
      YTD_CUMULATIVE: dhClone(dhReadGlobal('YTD_CUMULATIVE')),
      FEED_HIST: dhClone(dhReadGlobal('FEED_HIST')),
      ORG_DATA: dhClone(dhReadGlobal('ORG_DATA')),

      /* 사료 판매량 분석 쪽 */
      SV_DATA: dhClone(window.__SV_DATA__ || dhReadGlobal('SV_DATA')),
      SV_DATA_ORIG: dhClone(window.__SV_DATA_ORIG__),
      SV_SALES_PLAN: dhClone(window.__SV_SALES_PLAN__ || dhReadGlobal('SV_SALES_PLAN')),
      SV_SALES_PLAN_BY_MAJ: dhClone(window.__SV_SALES_PLAN_BY_MAJ__ || dhReadGlobal('SV_SALES_PLAN_BY_MAJ')),
      SV_SPECIES_CFG: dhClone(window.__SV_SPECIES_CFG__),
      REM_OPT: dhClone(window.__REM_OPT__),

      /* v20/v21 보조 데이터 */
      weeklyActuals: dhClone(window.__weeklyActuals),
      actualOverrides: dhClone(window.__actualOverrides),

      /* 첨부 파일 목록 계열 */
      attachedFiles: dhClone(window.__DH_ATTACHMENTS__ || window.__dfAttachments || window.DF_ATTACHMENTS)
    };

    return snapshot;
  }

  /* =========================
     4. Supabase 저장
  ========================= */
  window.saveSharedDashboardState = async function saveSharedDashboardState(reason) {
    if (!DH_DB) {
      dhSetBadge('Supabase 연결 전입니다.', 'err');
      return false;
    }

    if (DH_APPLYING) {
      dhLog('복원 중이므로 저장 생략');
      return false;
    }

    if (DH_SAVING) {
      dhLog('이미 저장 중');
      return false;
    }

    const now = Date.now();
    if (now - DH_LAST_SAVE_AT < 1200) {
      dhLog('너무 잦은 저장 방지');
      return false;
    }

    DH_SAVING = true;
    DH_LAST_SAVE_AT = now;

    try {
      dhSetBadge('공유 저장 중...', 'wait');

      const snapshot = dhMakeSnapshot(reason);

      const { data, error } = await DH_DB
        .from(TABLE_NAME)
        .insert({
          workspace_id: WORKSPACE_ID,
          snapshot: snapshot,
          uploaded_file_name: reason || 'dashboard-update'
        })
        .select('id, created_at')
        .single();

      if (error) {
        console.error(error);
        dhSetBadge('공유 저장 실패: ' + error.message, 'err');
        alert('공유 저장 실패: ' + error.message);
        return false;
      }

      DH_LAST_LOADED_ID = data && data.id ? data.id : DH_LAST_LOADED_ID;

      dhSetBadge('공유 저장 완료 · ' + new Date().toLocaleTimeString('ko-KR'), 'ok');
      dhLog('저장 완료', data);
      return true;

    } catch (err) {
      console.error(err);
      dhSetBadge('공유 저장 오류', 'err');
      alert('공유 저장 오류: ' + err.message);
      return false;

    } finally {
      DH_SAVING = false;
    }
  };

  /* =========================
     5. Supabase 최신 데이터 불러오기
  ========================= */
  window.loadLatestSharedDashboardState = async function loadLatestSharedDashboardState(showAlert) {
    if (!DH_DB) {
      dhSetBadge('Supabase 연결 전입니다.', 'err');
      return false;
    }

    try {
      dhSetBadge('공유 데이터 불러오는 중...', 'wait');

      const { data, error } = await DH_DB
        .from(TABLE_NAME)
        .select('id, snapshot, created_at')
        .eq('workspace_id', WORKSPACE_ID)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();

      if (error) {
        console.error(error);
        dhSetBadge('공유 불러오기 실패: ' + error.message, 'err');
        return false;
      }

      if (!data || !data.snapshot) {
        dhSetBadge('저장된 공유 데이터 없음', 'idle');
        return false;
      }

      DH_LAST_LOADED_ID = data.id;

      dhApplySnapshot(data.snapshot);

      dhSetBadge('공유 데이터 반영 완료 · ' + new Date(data.created_at).toLocaleTimeString('ko-KR'), 'ok');
      dhLog('불러오기 완료', data.created_at);

      if (showAlert) {
        alert('최신 공유 데이터를 불러왔습니다.');
      }

      return true;

    } catch (err) {
      console.error(err);
      dhSetBadge('공유 불러오기 오류', 'err');
      return false;
    }
  };

  /* =========================
     6. 불러온 데이터 화면에 반영
  ========================= */
  function dhApplySnapshot(S) {
    if (!S) return;

    DH_APPLYING = true;

    try {
      /* 배합사료 생산량 전망 */
      if (Array.isArray(S.USER_UPLOADS)) {
        dhWriteGlobal('USER_UPLOADS', S.USER_UPLOADS);
        window.USER_UPLOADS = S.USER_UPLOADS;
      }

      if (S.YTD_CUMULATIVE !== undefined) {
        dhWriteGlobal('YTD_CUMULATIVE', S.YTD_CUMULATIVE);
        window.YTD_CUMULATIVE = S.YTD_CUMULATIVE;
      }

      if (S.FEED_HIST) {
        dhWriteGlobal('FEED_HIST', S.FEED_HIST);
        window.FEED_HIST_DATA = S.FEED_HIST;
      }

      if (S.ORG_DATA) {
        dhWriteGlobal('ORG_DATA', S.ORG_DATA);
        window.ORG_DATA = S.ORG_DATA;
      }

      /* 사료 판매량 분석 */
      if (S.SV_DATA) {
        window.__SV_DATA__ = S.SV_DATA;
        dhWriteGlobal('SV_DATA', S.SV_DATA);
      }

      if (S.SV_DATA_ORIG) {
        window.__SV_DATA_ORIG__ = S.SV_DATA_ORIG;
      }

      if (S.SV_SALES_PLAN) {
        window.__SV_SALES_PLAN__ = S.SV_SALES_PLAN;
        window.__RESTORED_SALES_PLAN__ = S.SV_SALES_PLAN;
        dhWriteGlobal('SV_SALES_PLAN', S.SV_SALES_PLAN);
      }

      if (S.SV_SALES_PLAN_BY_MAJ) {
        window.__SV_SALES_PLAN_BY_MAJ__ = S.SV_SALES_PLAN_BY_MAJ;
        window.__RESTORED_SALES_PLAN_BY_MAJ__ = S.SV_SALES_PLAN_BY_MAJ;
        dhWriteGlobal('SV_SALES_PLAN_BY_MAJ', S.SV_SALES_PLAN_BY_MAJ);
      }

      if (S.SV_SPECIES_CFG) {
        window.__SV_SPECIES_CFG__ = S.SV_SPECIES_CFG;
      }

      if (S.REM_OPT) {
        window.__REM_OPT__ = S.REM_OPT;
      }

      if (S.weeklyActuals) {
        window.__weeklyActuals = S.weeklyActuals;
      }

      if (S.actualOverrides) {
        window.__actualOverrides = S.actualOverrides;
      }

      if (S.attachedFiles) {
        window.__DH_ATTACHMENTS__ = S.attachedFiles;
      }

      dhRefreshScreens();

    } catch (err) {
      console.error(err);
      dhWarn('스냅샷 반영 중 오류', err);

    } finally {
      setTimeout(function () {
        DH_APPLYING = false;
      }, 1000);
    }
  }

  /* =========================
     7. 화면 재렌더링
  ========================= */
  function dhRefreshScreens() {
    const jobs = [
      function () {
        if (typeof window.renderQuantUploadList === 'function') {
          window.renderQuantUploadList();
        }
      },
      function () {
        if (typeof window.runForecast === 'function') {
          window.runForecast();
        }
      },
      function () {
        if (typeof window.renderAll === 'function') {
          window.renderAll();
        }
      },
      function () {
        if (typeof window.renderSalesForecast === 'function') {
          window.renderSalesForecast();
        }
      },
      function () {
        if (typeof window.__v20_refresh === 'function') {
          window.__v20_refresh();
        }
      },
      function () {
        if (typeof window.updateLastTime === 'function') {
          window.updateLastTime();
        }
      }
    ];

    jobs.forEach(function (job, idx) {
      setTimeout(function () {
        try { job(); } catch (e) {}
      }, 150 + idx * 180);
    });

    setTimeout(function () {
      try {
        window.dispatchEvent(new Event('resize'));
      } catch (e) {}
    }, 900);
  }

  /* =========================
     8. 업로드/버튼 동작 후 자동 저장 연결
  ========================= */
  function dhPatchFunction(name, reason, delay) {
    try {
      const fn = window[name];
      if (typeof fn !== 'function') return false;
      if (fn.__dhSharedPatched) return true;

      const wrapped = async function () {
        const result = await fn.apply(this, arguments);

        setTimeout(function () {
          window.saveSharedDashboardState(reason || name);
        }, delay || 1500);

        return result;
      };

      wrapped.__dhSharedPatched = true;
      window[name] = wrapped;

      dhLog('함수 자동저장 연결:', name);
      return true;

    } catch (e) {
      return false;
    }
  }

  function dhPatchInputs() {
    const inputConfigs = [
      { id: 'quantFiles', reason: 'quant-files-upload', delay: 3000 },
      { id: 'qualPdf', reason: 'qual-pdf-upload', delay: 3000 },
      { id: 'svUpload', reason: 'sales-actual-upload', delay: 6500 },
      { id: 'svPlanUpload', reason: 'sales-plan-upload', delay: 4500 },
      { id: 'svPlanImgUpload', reason: 'sales-plan-image-upload', delay: 6500 }
    ];

    inputConfigs.forEach(function (cfg) {
      const el = document.getElementById(cfg.id);
      if (!el || el.__dhSharedPatched) return;

      el.__dhSharedPatched = true;

      el.addEventListener('change', function () {
        dhSetBadge('업로드 감지 · 처리 완료 후 공유 저장 예정', 'wait');

        setTimeout(function () {
          window.saveSharedDashboardState(cfg.reason);
        }, cfg.delay);
      }, true);

      dhLog('input 자동저장 연결:', cfg.id);
    });
  }

  function dhPatchButtons() {
    const buttonConfigs = [
      { id: 'svResetBtn', reason: 'sales-reset', delay: 1200 },
      { id: 'svSalesPlanBtn', reason: 'sales-plan-manual', delay: 1200 }
    ];

    buttonConfigs.forEach(function (cfg) {
      const el = document.getElementById(cfg.id);
      if (!el || el.__dhSharedBtnPatched) return;

      el.__dhSharedBtnPatched = true;

      el.addEventListener('click', function () {
        setTimeout(function () {
          window.saveSharedDashboardState(cfg.reason);
        }, cfg.delay);
      }, true);

      dhLog('button 자동저장 연결:', cfg.id);
    });
  }

  function dhPatchAll() {
    dhPatchFunction('handleQuantUpload', 'quant-upload', 1800);
    dhPatchFunction('runForecast', 'forecast-recalculate', 1200);
    dhPatchFunction('submitManualEntry', 'manual-quant-entry', 1200);
    dhPatchFunction('removeUpload', 'remove-upload', 900);
    dhPatchFunction('clearAllUploads', 'clear-uploads', 900);
    dhPatchFunction('submitKfiaForm', 'kfia-form-submit', 1200);
    dhPatchFunction('clearKfiaForm', 'kfia-form-clear', 900);

    dhPatchInputs();
    dhPatchButtons();
  }

  /* =========================
     9. Supabase 초기화
  ========================= */
  async function dhInitSharedState() {
    try {
      dhEnsureBadge();
      dhSetBadge('Supabase 연결 중...', 'wait');

      if (!SUPABASE_KEY || SUPABASE_KEY.indexOf('여기에_') >= 0) {
        dhSetBadge('Publishable key 입력 필요', 'err');
        alert('index.html 코드에서 SUPABASE_KEY에 Publishable key를 넣어주세요. Secret key가 아니라 Publishable key입니다.');
        return;
      }

      await dhLoadScript(SDK_URL);

      if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        dhSetBadge('Supabase SDK 로드 실패', 'err');
        return;
      }

      DH_DB = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      dhSetBadge('공유 저장 연결 완료', 'ok');

      setTimeout(function () {
        window.loadLatestSharedDashboardState(false);
      }, 900);

      setTimeout(dhPatchAll, 1500);
      setInterval(dhPatchAll, 3000);

    } catch (err) {
      console.error(err);
      dhSetBadge('공유 저장 초기화 실패', 'err');
    }
  }

  dhReady(function () {
    setTimeout(dhInitSharedState, 500);
  });

})();
</script>
